[build]
  base = "web"
  # publish is relative to base — dist ends up at repo/web/dist, not web/web/dist
  command = "node ../scripts/write-scena-config.js && npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Auth on Netlify: set SCENA_SUPABASE_URL, SCENA_SUPABASE_ANON_KEY (and optionally
# SCENA_AUTH_REDIRECT_URL). write-scena-config.js generates docs/scena-config.js at build time.
# Preview deploys use DEPLOY_PRIME_URL for auth redirect when SCENA_AUTH_REDIRECT_URL is unset.
# Add each preview URL pattern to Supabase → Authentication → Redirect URLs.
